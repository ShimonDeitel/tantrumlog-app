<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tantrum Log</title>
<style>
  body { margin:0; background:#161113; color:#f2f2f2; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
  .wrap { max-width:560px; padding:40px 24px; }
  h1 { font-size:2.2rem; color:#E0645C; margin-bottom:8px; }
  p { font-size:1.1rem; opacity:0.85; line-height:1.5; }
  a.badge { display:inline-block; margin-top:24px; padding:12px 22px; border-radius:10px; background:#E0645C; color:#111; font-weight:600; text-decoration:none; }
  .links { margin-top:32px; opacity:0.6; font-size:0.9rem; }
  .links a { color:#f2f2f2; margin:0 10px; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #E0645C55 0%, #E0645C00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
<div class="wrap">
  <h1>Tantrum Log</h1>
  <p>Log meltdowns with trigger, time and duration to spot patterns.</p>
  <a class="badge" href="#">Coming Soon on the App Store</a>
  <div class="links">
    <a href="privacy.html">Privacy Policy</a>
    <a href="terms.html">Terms of Use</a>
  </div>
</div>
</body>
</html>
